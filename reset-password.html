<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/lumora/favicon.svg">
  <link rel="alternate icon" href="/lumora/favicon.ico">
  <title>Reset password — Lumora</title>
  <meta name="description" content="Set a new password for your Lumora account.">
  <meta property="og:title" content="Reset password — Lumora">
  <meta property="og:description" content="Set a new password for your Lumora account.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hellenicdev.github.io/lumora/">
  <link rel="stylesheet" href="/lumora/css/main.css">
  <link rel="stylesheet" href="/lumora/css/auth.css">
<script src="/lumora/js/toast.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9FWQFZME3Z"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9FWQFZME3Z');</script>
</head>
<body class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="auth-header">
      <a href="/lumora/" class="logo">Lumora</a>
      <h1>Set new password</h1>
      <p>Enter your new password below</p>
    </div>
    <form id="resetForm" class="auth-form glass">
      <div id="alert" class="alert" role="alert"></div>
      <input type="hidden" id="token">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" class="input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" class="input" placeholder="Repeat your password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Reset password</button>
    </form>
    <div class="auth-footer">
      <a href="/lumora/login.html">Back to log in</a>
    </div>
  </div>
  <script src="/lumora/js/theme.js"></script>
  <script src="/lumora/js/config.js"></script>
  <script src="/lumora/js/api.js"></script>
  <script src="/lumora/js/auth.js"></script>
</body>
</html>
