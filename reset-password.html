<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <base href="/lumora/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Lumora</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
<script src="/js/toast.js"></script>
</head>
<body class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="auth-header">
      <a href="/" class="logo">Lumora</a>
      <h1>Set new password</h1>
      <p>Enter your new password below</p>
    </div>
    <form id="resetForm" class="auth-form glass">
      <div id="alert" class="alert" role="alert"></div>
      <input type="hidden" id="token">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" class="input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" class="input" placeholder="Repeat your password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Reset password</button>
    </form>
    <div class="auth-footer">
      <a href="/login.html">Back to log in</a>
    </div>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
