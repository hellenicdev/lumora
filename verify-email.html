<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/lumora/favicon.svg">
  <link rel="alternate icon" href="/lumora/favicon.ico">
  <title>Verify email — Lumora</title>
  <meta name="description" content="Verify your email address for Lumora.">
  <meta property="og:title" content="Verify email — Lumora">
  <meta property="og:description" content="Verify your email address for Lumora.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hellenicdev.github.io/lumora/">
  <link rel="stylesheet" href="/lumora/css/main.css">
  <link rel="stylesheet" href="/lumora/css/auth.css">
<script src="/lumora/js/toast.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9FWQFZME3Z"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9FWQFZME3Z');</script>
</head>
<body class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-container" style="text-align:center">
    <div class="auth-header">
      <a href="/lumora/" class="logo">Lumora</a>
      <h1>Verifying your email</h1>
    </div>
    <div class="auth-form glass" id="verifyStatus">
      <p style="color:var(--text-secondary)">Please wait while we verify your email address...</p>
    </div>
    <div class="auth-footer" id="verifyFooter" style="display:none">
      <a href="/lumora/login.html">Go to log in</a>
    </div>
  </div>
  <script src="/lumora/js/config.js"></script>
  <script src="/lumora/js/theme.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const apiBase = (typeof LUMORA_CONFIG !== 'undefined') ? LUMORA_CONFIG.API_BASE : 'http://localhost:3070/api';

      if (!token) {
        document.getElementById('verifyStatus').innerHTML = '<p style="color:var(--error)">Invalid verification link.</p>';
        document.getElementById('verifyFooter').style.display = 'block';
        return;
      }

      fetch(apiBase + '/auth/verify-email/' + encodeURIComponent(token))
        .then(function (res) { return res.json(); })
        .then(function (data) {
          const el = document.getElementById('verifyStatus');
          if (data.success) {
            el.innerHTML = '<p style="color:var(--success);font-size:18px;font-weight:600">Email verified!</p><p style="color:var(--text-secondary);margin-top:8px">You can now log in to your account.</p>';
          } else {
            el.innerHTML = '<p style="color:var(--error)">' + (data.error || 'Verification failed') + '</p>';
          }
          document.getElementById('verifyFooter').style.display = 'block';
        })
        .catch(function () {
          document.getElementById('verifyStatus').innerHTML = '<p style="color:var(--error)">Connection error. Please try again.</p>';
          document.getElementById('verifyFooter').style.display = 'block';
        });
    })();
  </script>
</body>
</html>
