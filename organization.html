<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/lumora/favicon.svg">
  <link rel="alternate icon" href="/lumora/favicon.ico">
  <title>Organization — Lumora</title>
  <meta name="description" content="Manage your Lumora organization settings and members.">
  <meta property="og:title" content="Organization — Lumora">
  <meta property="og:description" content="Manage your Lumora organization settings and members.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hellenicdev.github.io/lumora/">
  <link rel="stylesheet" href="/lumora/css/main.css">
  <link rel="stylesheet" href="/lumora/css/dashboard.css">
  <link rel="stylesheet" href="/lumora/css/team.css">
  <link rel="stylesheet" href="/lumora/css/repositories.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9FWQFZME3Z"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9FWQFZME3Z');</script>
</head>
<body class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/lumora/" class="logo">Lumora</a>
      <button class="sidebar-close" id="sidebarClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="/lumora/dashboard.html" class="nav-item">Dashboard</a>
      <a href="/lumora/repositories.html" class="nav-item">Repositories</a>
      <a href="/lumora/documentation.html" class="nav-item">Documentation</a>
      <a href="/lumora/chat.html" class="nav-item">AI Chat</a>
      <a href="/lumora/health.html" class="nav-item">Health</a>
      <a href="/lumora/team.html" class="nav-item active">Team</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="userMenuTrigger">
        <div class="sidebar-user-avatar" id="userAvatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">User</div>
          <div class="sidebar-user-email" id="userEmail">user@example.com</div>
          <div id="planBadge"></div>
        </div>
      </div>
      <a href="#" id="logoutBtn" class="nav-item" style="color:var(--danger);margin-top:8px">Logout</a>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <a href="/lumora/team.html" class="btn btn-ghost" style="padding:4px 8px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back
        </a>
      </div>
      <div class="topbar-right">
        <button id="themeToggle" class="icon-btn theme-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path class="sun" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/><path class="moon" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
      </div>
    </header>

    <div class="page-content">
      <div id="orgLoading" class="card" style="padding:60px;text-align:center">
        <div class="skeleton" style="width:200px;height:28px;margin:0 auto 12px"></div>
      </div>

      <div id="orgContent" style="display:none">
        <div class="org-detail-header">
          <div class="org-icon" id="orgIcon" style="width:56px;height:56px;font-size:24px">L</div>
          <div>
            <h1 id="orgName" style="font-size:28px;font-weight:700;margin-bottom:4px">—</h1>
            <p id="orgMeta" style="color:var(--text-secondary)">—</p>
          </div>
          <div style="margin-left:auto">
            <span class="badge badge-primary" id="orgPlan">free</span>
          </div>
        </div>

        <div style="display:flex;gap:12px;margin-top:8px">
          <button class="btn btn-ghost" id="leaveOrgBtn" style="color:var(--error);border-color:rgba(239,68,68,0.3);display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Leave Organization
          </button>
        </div>

        <div class="tabs" style="margin-top:32px">
          <button class="tab active" data-tab="members">Members</button>
          <button class="tab" data-tab="invite">Invite</button>
        </div>

        <div id="tab-members" class="tab-content">
          <div class="member-list" id="memberList"></div>
        </div>

        <div id="tab-invite" class="tab-content" style="display:none">
          <div class="card" style="padding:24px;max-width:500px">
            <h3 style="font-size:18px;margin-bottom:8px">Invite Member</h3>
            <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">Send an invitation to join this organization.</p>
            <form id="inviteForm">
              <div class="form-group">
                <label for="inviteEmail">Email address</label>
                <input type="email" id="inviteEmail" class="input" placeholder="colleague@example.com" required>
              </div>
              <div class="form-group">
                <label for="inviteRole">Role</label>
                <select id="inviteRole" class="input">
                  <option value="developer">Developer</option>
                  <option value="admin">Admin</option>
                  <option value="viewer">Viewer</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary" style="margin-top:8px">Send Invitation</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/lumora/js/theme.js"></script>
  <script src="/lumora/js/config.js"></script>
  <script src="/lumora/js/api.js"></script>
  <script src="/lumora/js/dashboard.js"></script>
  <script src="/lumora/js/organization.js"></script>
</body>
</html>
