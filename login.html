<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Lumora</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/js/toast.js"></script>
</head>
<body class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="auth-header">
      <a href="/" class="logo">Lumora</a>
      <h1>Welcome back</h1>
      <p>Log in to your Lumora account</p>
    </div>
    <form id="loginForm" class="auth-form glass">
      <div id="alert" class="alert" role="alert"></div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="input" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="input" placeholder="Enter your password" required minlength="8" autocomplete="current-password">
      </div>
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
        <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>
      <div id="turnstileWidget"></div>
      <button type="submit" class="btn btn-primary auth-submit">Log in</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Sign up</a>
    </div>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
