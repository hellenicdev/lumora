<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Lumora</title>
  <link rel="stylesheet" href="/lumora/css/main.css">
  <link rel="stylesheet" href="/lumora/css/auth.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/lumora/js/toast.js"></script>
</head>
<body class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="auth-header">
      <a href="/lumora/" class="logo">Lumora</a>
      <h1>Create your account</h1>
      <p>Start understanding your codebase with AI</p>
    </div>
    <form id="registerForm" class="auth-form glass">
      <div id="alert" class="alert" role="alert"></div>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" class="input" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="input" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" class="input" placeholder="Repeat your password" required minlength="8" autocomplete="new-password">
      </div>
      <div id="turnstileWidget"></div>
      <button type="submit" class="btn btn-primary auth-submit">Create account</button>
      <div class="auth-divider">or</div>
      <button type="button" class="btn-github" id="githubRegisterBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        Sign up with GitHub
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/lumora/login.html">Log in</a>
    </div>
  </div>
  <script src="/lumora/js/theme.js"></script>
  <script src="/lumora/js/config.js"></script>
  <script src="/lumora/js/api.js"></script>
  <script src="/lumora/js/auth.js"></script>
  <script>
    document.getElementById('githubRegisterBtn')?.addEventListener('click', function () {
      var apiBase = (typeof LUMORA_CONFIG !== 'undefined') ? LUMORA_CONFIG.API_BASE : 'http://localhost:3070/api';
      window.location.href = apiBase + '/github/login';
    });
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (params.get('github') === 'error') {
        showToast(params.get('msg') ? 'GitHub sign in failed: ' + params.get('msg') : 'GitHub sign in failed', 'error');
      }
    })();
  </script>
</body>
</html>
