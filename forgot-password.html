<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/lumora/favicon.svg">
  <link rel="alternate icon" href="/lumora/favicon.ico">
  <title>Forgot password — Lumora</title>
  <meta name="description" content="Reset your Lumora account password.">
  <meta property="og:title" content="Forgot password — Lumora">
  <meta property="og:description" content="Reset your Lumora account password.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hellenicdev.github.io/lumora/">
  <link rel="stylesheet" href="/lumora/css/main.css">
  <link rel="stylesheet" href="/lumora/css/auth.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/lumora/js/toast.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9FWQFZME3Z"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9FWQFZME3Z');</script>
</head>
<body class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="auth-header">
      <a href="/lumora/" class="logo">Lumora</a>
      <h1>Reset your password</h1>
      <p>Enter your email and we'll send you a reset link</p>
    </div>
    <form id="forgotForm" class="auth-form glass">
      <div id="alert" class="alert" role="alert"></div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="input" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div id="turnstileWidget"></div>
      <button type="submit" class="btn btn-primary auth-submit">Send reset link</button>
    </form>
    <div class="auth-footer">
      <a href="/lumora/login.html">Back to log in</a>
    </div>
  </div>
  <script src="/lumora/js/theme.js"></script>
  <script src="/lumora/js/config.js"></script>
  <script src="/lumora/js/api.js"></script>
  <script src="/lumora/js/auth.js"></script>
</body>
</html>
